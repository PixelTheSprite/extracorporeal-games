<script>

 // ===== ACHIEVEMENT SETUP =====

            {

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const W = 860, H = 520;

// ==============================
// UTILITY
// ==============================
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ==============================
// CHARACTER DEFINITIONS
// Nintendo parody cast
// ==============================
const CHARS = [
  {
    id:'mario', name:'MARIO B.',
    parody: 'Moustachioed plumber in red cap',
    color:'#ef5350', darkColor:'#b71c1c',
    drawFn: drawMarioB,
    attacks:{ normal:{w:52,h:30,dmg:9,kb:7}, special:{w:70,h:22,dmg:15,kb:13} }
  },

    id:'linc', name:'LINC',
    parody: 'Pointy-eared hero with green tunic and shield',
    color:'#66bb6a', darkColor:'#2e7d32',
    drawFn: drawLinc,
    attacks:{ normal:{w:68,h:26,dmg:8,kb:8}, special:{w:90,h:18,dmg:14,kb:14} }
  },
  {
    id:'pika', name:'PIKA-CHU',
    parody: 'Round yellow electric mouse',
    color:'#ffca28', darkColor:'#f57f17',
    drawFn: drawPikaChu,
    attacks:{ normal:{w:55,h:35,dmg:7,kb:9}, special:{w:85,h:20,dmg:16,kb:18} }
  },
  {
    id:'samas', name:'SAMAS',

  },

  },

  }
];

// ==============================
// DRAW FUNCTIONS — Nintendo parodies
// ==============================

// MARIO B. — Red-capped plumber
function drawMarioB(ctx, x, y, facingRight, color, dark, frame) {
  const f = facingRight ? 1 : -1;
  ctx.save(); ctx.translate(x+20, y+22); ctx.scale(f,1);
  // Legs with overalls
  ctx.fillStyle = '#1565c0';
  ctx.fillRect(-10, 16, 8, 12+(frame%2)*2);
  ctx.fillRect(3, 16, 8, 12-(frame%2)*2);
  // Shoes
  ctx.fillStyle = '#4e342e';
  ctx.fillRect(-12, 26+(frame%2)*2, 11, 5);
  ctx.fillRect(2, 26-(frame%2)*2, 11, 5);
  // Overalls body
  ctx.fillStyle = '#1565c0'; roundRect(ctx,-11,-4,22,22,3); ctx.fill();
  // Red shirt
  ctx.fillStyle = color; roundRect(ctx,-8,-4,16,14,2); ctx.fill();
  // Overall straps
  ctx.fillStyle = '#1565c0';
  ctx.fillRect(-9, -6, 5, 4); ctx.fillRect(4, -6, 5, 4);
  // Head (skin)
  ctx.fillStyle = '#ffcc80'; roundRect(ctx,-9,-22,18,18,6); ctx.fill();
  // Moustache
  ctx.fillStyle = '#5d4037';
  roundRect(ctx,-7,-10,14,5,3); ctx.fill();
  // Eye
  ctx.fillStyle = '#000'; ctx.fillRect(2,-16,4,4);
  // Red cap with M
  ctx.fillStyle = color; roundRect(ctx,-11,-26,22,10,3); ctx.fill();
  ctx.fillStyle = dark; ctx.fillRect(-9,-30,18,8); roundRect(ctx,-9,-30,18,8,4); ctx.fill();
  // White gloves
  ctx.fillStyle = '#fff';
  roundRect(ctx,11,-2,10,10,5); ctx.fill();
  ctx.restore();
}

// LINC — green tunic elf hero
function drawLinc(ctx, x, y, facingRight, color, dark, frame) {
  const f = facingRight ? 1 : -1;
  ctx.save(); ctx.translate(x+20, y+22); ctx.scale(f,1);
  // Legs
  ctx.fillStyle = '#a5d6a7'; ctx.fillRect(-8,16,7,11+(frame%2)*2); ctx.fillRect(2,16,7,11-(frame%2)*2);
  // Boots
  ctx.fillStyle = '#795548'; ctx.fillRect(-10,24+(frame%2)*2,10,6); ctx.fillRect(1,24-(frame%2)*2,10,6);
  // Tunic body
  ctx.fillStyle = color; roundRect(ctx,-10,-5,20,23,3); ctx.fill();
  ctx.fillStyle = dark; roundRect(ctx,-10,-5,20,10,3); ctx.fill(); // darker top
  ctx.fillStyle = color; ctx.fillRect(-10,0,20,18); // fix overlap
  // Belt
  ctx.fillStyle = '#795548'; ctx.fillRect(-10,13,20,4);
  ctx.fillStyle = '#ffca28'; ctx.fillRect(-2,13,4,4); // buckle
  // Skin
  ctx.fillStyle = '#ffcc80'; roundRect(ctx,-8,-22,16,20,5); ctx.fill();
  // Pointed ears
  ctx.fillStyle = '#ffcc80';
  ctx.beginPath(); ctx.moveTo(8,-18); ctx.lineTo(16,-25); ctx.lineTo(8,-12); ctx.fill();
  // Eye
  ctx.fillStyle = '#000'; ctx.fillRect(1,-16,3,3);
  // Green hat
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(-10,-20); ctx.lineTo(8,-20); ctx.lineTo(4,-34); ctx.closePath(); ctx.fill();
  roundRect(ctx,-10,-24,20,6,2); ctx.fill();
  // Sword
  ctx.fillStyle = '#e0e0e0'; ctx.fillRect(11,-20,3,34);
  ctx.fillStyle = '#ffca28'; ctx.fillRect(8,-6,9,5);
  // Shield hint
  ctx.fillStyle = '#1565c0'; roundRect(ctx,-22,-4,10,14,2); ctx.fill();
  ctx.fillStyle = '#ffca28'; ctx.fillRect(-20,0,6,2);
  ctx.restore();
}

// PIKA-CHU — electric yellow mouse
function drawPikaChu(ctx, x, y, facingRight, color, dark, frame) {
  const f = facingRight ? 1 : -1;
  ctx.save(); ctx.translate(x+20, y+22); ctx.scale(f,1);
  // Tail (zigzag lightning bolt)
  ctx.strokeStyle = color; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-10,4); ctx.lineTo(-18,-2); ctx.lineTo(-14,-10); ctx.lineTo(-22,-16); ctx.stroke();
  // Body
  ctx.fillStyle = color; roundRect(ctx,-14,-4,28,24,10); ctx.fill();
  // Brown stripes on back
  ctx.fillStyle = dark; ctx.fillRect(-14,-4,6,10); ctx.fillRect(8,-4,6,10);
  ctx.fillStyle = color; roundRect(ctx,-14,-4,28,24,10); // re-draw front to hide stripe overflow
  ctx.beginPath(); ctx.arc(0,4,14,0,Math.PI*2); ctx.fill(); // round body
  // Belly
  ctx.fillStyle = '#fff8e1'; ctx.beginPath(); ctx.ellipse(0,8,8,7,0,0,Math.PI*2); ctx.fill();
  // Red cheeks
  ctx.fillStyle = '#ef5350'; ctx.beginPath(); ctx.ellipse(-10,2,5,4,0,0,Math.PI*2); ctx.fill();
  // Head
  ctx.fillStyle = color; roundRect(ctx,-12,-22,24,22,8); ctx.fill();
  // Ears
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.moveTo(-8,-20); ctx.lineTo(-14,-36); ctx.lineTo(-2,-20); ctx.fill();
  ctx.beginPath(); ctx.moveTo(8,-20); ctx.lineTo(14,-36); ctx.lineTo(2,-20); ctx.fill();
  // Black ear tips
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.moveTo(-9,-28); ctx.lineTo(-14,-36); ctx.lineTo(-4,-28); ctx.fill();
  ctx.beginPath(); ctx.moveTo(9,-28); ctx.lineTo(14,-36); ctx.lineTo(4,-28); ctx.fill();
  // Eyes
  ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(-4,-14,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(4,-14,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(-3,-15,1,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(5,-15,1,0,Math.PI*2); ctx.fill();
  // Nose
  ctx.fillStyle = '#000'; ctx.fillRect(-1,-11,2,2);
  // Feet
  ctx.fillStyle = color; roundRect(ctx,-13,18,10,8,4); ctx.fill(); roundRect(ctx,3,18,10,8,4); ctx.fill();
  ctx.restore();
}

// SAMAS — armored bounty huntress
function drawSamas(ctx, x, y, facingRight, color, dark, frame) {
  const f = facingRight ? 1 : -1;
  ctx.save(); ctx.translate(x+20, y+22); ctx.scale(f,1);
  // Legs — armored
  ctx.fillStyle = dark; roundRect(ctx,-10,14,10,14,3); ctx.fill(); roundRect(ctx,2,14,10,14,3); ctx.fill();
  ctx.fillStyle = color; ctx.fillRect(-9,14,8,10); ctx.fillRect(3,14,8,10);
  // Body armor
  ctx.fillStyle = dark; roundRect(ctx,-13,-6,26,22,4); ctx.fill();
  ctx.fillStyle = color; roundRect(ctx,-10,-4,20,18,3); ctx.fill();
  // Chest detail lines
  ctx.fillStyle = dark; ctx.fillRect(-8,-2,16,3); ctx.fillRect(-8,4,16,3);
  // Shoulder pads
  ctx.fillStyle = color; roundRect(ctx,-16,-8,10,10,4); ctx.fill(); roundRect(ctx,6,-8,10,10,4); ctx.fill();
  // Helmet
  ctx.fillStyle = dark; roundRect(ctx,-11,-24,22,22,5); ctx.fill();
  ctx.fillStyle = color; roundRect(ctx,-9,-22,18,18,4); ctx.fill();
  // Visor
  ctx.fillStyle = '#e3f2fd'; roundRect(ctx,-7,-18,14,7,3); ctx.fill();
  ctx.fillStyle = '#00bcd488'; roundRect(ctx,-7,-18,14,7,3); ctx.fill();
  // Arm cannon
  ctx.fillStyle = dark; roundRect(ctx,13,-4,22,14,4); ctx.fill();
  ctx.fillStyle = color; roundRect(ctx,14,-3,18,12,3); ctx.fill();
  ctx.fillStyle = '#00e5ff'; roundRect(ctx,28,-2,8,10,4); ctx.fill();
  ctx.restore();
}

// FOXXY — Star Fox pilot
function drawFoxxy(ctx, x, y, facingRight, color, dark, frame) {
  const f = facingRight ? 1 : -1;
  ctx.save(); ctx.translate(x+20, y+22); ctx.scale(f,1);
  // Tail — fluffy
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(-14,10,8,12,0.4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = color; ctx.beginPath(); ctx.ellipse(-14,10,6,10,0.4,0,Math.PI*2); ctx.fill();
  // Legs
  ctx.fillStyle = '#37474f'; ctx.fillRect(-9,16,8,12+(frame%2)*2); ctx.fillRect(3,16,8,12-(frame%2)*2);
  ctx.fillStyle = '#fff'; ctx.fillRect(-9,24+(frame%2)*2,8,5); ctx.fillRect(3,24-(frame%2)*2,8,5);
  // Flight suit body
  ctx.fillStyle = '#37474f'; roundRect(ctx,-11,-5,22,23,3); ctx.fill();
  // Orange bib

function drawBgStars(colors) {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,colors.sky1); sky.addColorStop(1,colors.sky2);
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff55';
  for(let i=0;i<100;i++) ctx.fillRect((i*137+50)%W,(i*89+20)%(H*0.85),1+(i%2),1+(i%2));
  // floating island
  ctx.fillStyle='#1a0040';
  ctx.beginPath(); ctx.ellipse(430,440,350,40,0,0,Math.PI*2); ctx.fill();
}
function drawBgSpaceRift(colors) {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#000'); sky.addColorStop(0.5,colors.sky2); sky.addColorStop(1,'#000');

// ==============================
// PLATFORM DRAWING (themed per stage)
// ==============================
function drawStagePlatforms(stage) {
  stage.platforms.forEach(p=>{
    const isMain=p.main;
    const c=stage.colors;
    ctx.fillStyle=c.main; roundRect(ctx,p.x,p.y,p.w,p.h,isMain?4:6); ctx.fill();
    ctx.strokeStyle=c.plat; ctx.lineWidth=2;
    roundRect(ctx,p.x,p.y,p.w,p.h,isMain?4:6); ctx.stroke();
    ctx.strokeStyle=c.glow+'aa'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(p.x+4,p.y+1); ctx.lineTo(p.x+p.w-4,p.y+1); ctx.stroke();
  });
  ctx.strokeStyle='#ff6b0018'; ctx.lineWidth=1; ctx.setLineDash([6,6]);
  ctx.strokeRect(20,20,W-40,H-40); ctx.setLineDash([]);
}

// ==============================
// PARTICLES & EFFECTS
// ==============================
const particles=[];
function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:30,maxLife:30,color});
  }
}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life--;if(p.life<=0)particles.splice(i,1);}}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=p.life/p.maxLife;ctx.fillStyle=p.color;const sz=4*(p.life/p.maxLife);ctx.fillRect(p.x-sz/2,p.y-sz/2,sz,sz);});ctx.globalAlpha=1;}

const hitflashes=[];
function spawnHitFlash(x,y,big){hitflashes.push({x,y,life:12,big});}
function drawHitFlashes(){
  hitflashes.forEach(h=>{const r=(h.big?28:16)*(h.life/12);ctx.globalAlpha=h.life/12*0.9;ctx.strokeStyle='#fff';ctx.lineWidth=3;for(let i=0;i<6;i++){const a=i/6*Math.PI*2,r2=r+4;ctx.beginPath();ctx.moveTo(h.x+Math.cos(a)*(r-6),h.y+Math.sin(a)*(r-6));ctx.lineTo(h.x+Math.cos(a)*r2,h.y+Math.sin(a)*r2);ctx.stroke();}ctx.globalAlpha=1;});
  for(let i=hitflashes.length-1;i>=0;i--){hitflashes[i].life--;if(!hitflashes[i].life)hitflashes.splice(i,1);}
}

// ==============================
// PLAYER CLASS
// ==============================
const GRAVITY=0.5,JUMP_FORCE=-12,SPEED=3.5,STOCKS=3;
let currentPlatforms=[];

class Player {
  constructor(id,charData,x,y,keys){
    this.id=id; this.char=charData; this.x=x; this.y=y;
    this.vx=0; this.vy=0;
    this.color=charData.color; this.dark=charData.darkColor;
    this.keys=keys; this.w=40; this.h=48;
    this.onGround=false; this.jumps=2;
    this.facing=id===1?1:-1;
    this.damage=0; this.stocks=STOCKS;
    this.attackTimer=0; this.hitStun=0; this.dodgeTimer=0;
    this.attackBox=null; this.frameCount=0;
    this.respawnTimer=0; this.dead=false;
    this.name=charData.name;
  }
  update(keys,other){
    if(this.dead){this.respawnTimer--;if(this.respawnTimer<=0)this.respawn();return;}
    this.frameCount++;
    if(this.hitStun>0)this.hitStun--;
    if(this.dodgeTimer>0)this.dodgeTimer--;
    if(this.attackTimer>0){this.attackTimer--;if(this.attackTimer===0)this.attackBox=null;}
    if(this.hitStun===0&&this.dodgeTimer===0){
      if(keys[this.keys.left]){this.vx=-SPEED;this.facing=-1;}
      else if(keys[this.keys.right]){this.vx=SPEED;this.facing=1;}
      else{this.vx*=0.7;}
      if(keys[this.keys.up]&&!this._jumpHeld&&this.jumps>0){this.vy=JUMP_FORCE;this.jumps--;this._jumpHeld=true;}
      if(!keys[this.keys.up])this._jumpHeld=false;
      if(keys[this.keys.attack]&&!this._atkHeld&&this.attackTimer===0){this._atkHeld=true;this.doAttack('normal',other);}
      if(!keys[this.keys.attack])this._atkHeld=false;
      if(keys[this.keys.special]&&!this._spHeld&&this.attackTimer===0){this._spHeld=true;this.doAttack('special',other);}
      if(!keys[this.keys.special])this._spHeld=false;
      if(keys[this.keys.dodge]&&!this._dHeld&&this.onGround){this._dHeld=true;this.dodgeTimer=24;spawnParticles(this.x+20,this.y+24,'#fff',5);}
      if(!keys[this.keys.dodge])this._dHeld=false;
    }
    this.vy+=GRAVITY; this.x+=this.vx; this.y+=this.vy;
    this.onGround=false;
    for(const p of currentPlatforms){
      if(this.x+this.w>p.x&&this.x<p.x+p.w&&this.y+this.h>p.y&&this.y+this.h<p.y+p.h+this.vy+8&&this.vy>=0){
        this.y=p.y-this.h;this.vy=0;this.onGround=true;this.jumps=2;
      }
    }
    if(this.x<-150||this.x>W+100||this.y>H+60||this.y<-200)this.die();
    if(this.attackBox&&other&&!other.dead&&other.dodgeTimer===0){
      const ab=this.attackBox;
      if(ab.x<other.x+other.w&&ab.x+ab.w>other.x&&ab.y<other.y+other.h&&ab.y+ab.h>other.y){
        this.attackBox=null;other.takeHit(ab.dmg,ab.kb,this.facing,ab.special);
        spawnParticles(other.x+20,other.y+24,other.color,10);spawnHitFlash(other.x+20,other.y+20,ab.special);
      }
    }
  }
  doAttack(type,other){
    const ad=this.char.attacks[type];const isSpecial=type==='special';
    this.attackTimer=isSpecial?35:22;
    const bx=this.facing===1?this.x+this.w:this.x-ad.w;
    this.attackBox={x:bx,y:this.y+(this.h-ad.h)/2,w:ad.w,h:ad.h,dmg:ad.dmg,kb:ad.kb,special:isSpecial};
    spawnParticles(bx+ad.w/2,this.y+this.h/2,isSpecial?'#fff':this.color,isSpecial?6:3);
  }
  takeHit(dmg,kb,dir,special){
    if(this.dodgeTimer>0)return;
    this.damage+=dmg;const kbMul=1+this.damage/80;
    this.vx=dir*kb*kbMul*(special?1.4:1);this.vy=-kb*0.6*kbMul;
    this.hitStun=Math.min(40,12+Math.floor(this.damage/10));this.attackBox=null;
  }
  die(){
    if(this.dead)return;this.dead=true;this.stocks--;this.damage=0;this.attackBox=null;
    this.respawnTimer=100;spawnParticles(this.x+20,this.y+20,this.color,20);showKO();
    if(this.stocks<0)this.stocks=0;
  }
  respawn(){
    this.dead=false;this.x=this.id===1?200:540;this.y=100;
    this.vx=0;this.vy=0;this.hitStun=60;this.dodgeTimer=0;
  }
  draw(){
    if(this.dead)return;
    const alpha=this.dodgeTimer>0?0.35:(this.hitStun>0&&Math.floor(this.frameCount/4)%2===0?0.5:1);
    ctx.globalAlpha=alpha;
    this.char.drawFn(ctx,this.x,this.y,this.facing===1,this.color,this.dark,Math.floor(this.frameCount/8));
    ctx.globalAlpha=1;
    if(this.attackBox){ctx.strokeStyle=this.color+'66';ctx.lineWidth=1;ctx.strokeRect(this.attackBox.x,this.attackBox.y,this.attackBox.w,this.attackBox.h);}
    ctx.fillStyle=this.color;ctx.font='7px "Press Start 2P"';ctx.textAlign='center';
    ctx.fillText(this.name,this.x+20,this.y-6);
  }
}

// ==============================
// GAME STATE
// ==============================
let p1,p2;let keysDown={};let gameTime=99;let timeInterval;let gameRunning=false;let frameId;
let currentStage=STAGES[0];
const KEY_P1={left:'a',right:'d',up:'w',down:'s',attack:'f',special:'g',dodge:'h'};
const KEY_P2={left:'ArrowLeft',right:'ArrowRight',up:'ArrowUp',down:'ArrowDown',attack:'l',special:';',dodge:"'"};
document.addEventListener('keydown',e=>{keysDown[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();});
document.addEventListener('keyup',e=>{keysDown[e.key]=false;});

let koTimer=0;
function showKO(){document.getElementById('ko-overlay').style.opacity=1;koTimer=60;}
function updateKO(){if(koTimer>0){koTimer--;if(koTimer===0)document.getElementById('ko-overlay').style.opacity=0;}}

function gameLoop(){
  ctx.clearRect(0,0,W,H);
  currentStage.bgFn(currentStage.colors);
  drawStagePlatforms(currentStage);
  updateParticles();drawParticles();
  p1.update(keysDown,p2);p2.update(keysDown,p1);
  p1.draw();p2.draw();
  drawHitFlashes();updateKO();updateHUD();checkWin();
  frameId=requestAnimationFrame(gameLoop);
}

function updateHUD(){
  document.getElementById('p1-pct').textContent=Math.round(p1.damage)+'%';
  document.getElementById('p2-pct').textContent=Math.round(p2.damage)+'%';
  updateStocks('p1-stocks',p1);updateStocks('p2-stocks',p2);
}
function updateStocks(id,player){
  const el=document.getElementById(id);el.innerHTML='';
  for(let i=0;i<STOCKS;i++){const d=document.createElement('div');d.className='stock-dot';if(i>=player.stocks)d.style.background='transparent';el.appendChild(d);}
}
function checkWin(){if(gameTime<=0||p1.stocks<=0||p2.stocks<=0)endGame();}
function endGame(){
  if(!gameRunning)return;gameRunning=false;cancelAnimationFrame(frameId);clearInterval(timeInterval);
  let winner;
  if(p1.stocks>p2.stocks)winner=p1.name+' (P1)';
  else if(p2.stocks>p1.stocks)winner=p2.name+' (P2)';
  else if(p1.damage<p2.damage)winner=p1.name+' (P1)';
  else if(p2.damage<p1.damage)winner=p2.name+' (P2)';
  else winner='DRAW!';
  document.getElementById('winner-text').textContent=winner+' WINS!';
  document.getElementById('result-screen').style.display='flex';
}

// ==============================
// SELECT SCREEN SETUP
// ==============================
let sel1=0,sel2=1,selStage=0;

function buildCharSelect(){
  ['p1-grid','p2-grid'].forEach((gid,pi)=>{
    const grid=document.getElementById(gid);grid.innerHTML='';
    CHARS.forEach((c,i)=>{
      const card=document.createElement('div');
      card.className='char-card'+((pi===0&&i===sel1)||(pi===1&&i===sel2)?' selected':'');
      const cv=document.createElement('canvas');cv.width=40;cv.height=48;cv.style.width='40px';cv.style.height='48px';
      const cx=cv.getContext('2d');c.drawFn(cx,0,0,true,c.color,c.darkColor,0);
      const nm=document.createElement('div');nm.className='name';nm.textContent=c.name;
      card.appendChild(cv);card.appendChild(nm);
      card.addEventListener('click',()=>{if(pi===0)sel1=i;else sel2=i;buildCharSelect();});
      grid.appendChild(card);
    });
  });
}

function buildStageSelect(){
  const grid=document.getElementById('stage-grid');grid.innerHTML='';
  STAGES.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='stage-card'+(i===selStage?' selected':'');
    // Mini preview canvas
    const cv=document.createElement('canvas');cv.width=120;cv.height=68;cv.style.width='120px';cv.style.height='68px';
    const cx=cv.getContext('2d');
    // Draw mini stage preview
    drawMiniStage(cx,s);
    const nm=document.createElement('div');nm.className='sname';nm.textContent=s.name;
    card.appendChild(cv);card.appendChild(nm);
    card.addEventListener('click',()=>{selStage=i;buildStageSelect();});
    grid.appendChild(card);
  });
}

function drawMiniStage(cx, stage){
  const sw=120,sh=68,scaleX=sw/W,scaleY=sh/H;
  cx.save();cx.scale(scaleX,scaleY);
  stage.bgFn(stage.colors);
  // Draw platforms simplified
  stage.platforms.forEach(p=>{
    cx.fillStyle=stage.colors.main; roundRect(cx,p.x,p.y,p.w,p.h,p.main?4:6); cx.fill();
    cx.strokeStyle=stage.colors.plat;cx.lineWidth=3;
    roundRect(cx,p.x,p.y,p.w,p.h,p.main?4:6);cx.stroke();
  });
  cx.restore();
}

buildCharSelect();buildStageSelect();

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('play-again-btn').addEventListener('click',()=>{
  document.getElementById('result-screen').style.display='none';
  startGame();
});
document.getElementById('char-select-btn').addEventListener('click',()=>{
  document.getElementById('result-screen').style.display='none';
  document.getElementById('title-screen').style.display='flex';
  document.getElementById('game-wrap').style.display='none';
  buildCharSelect();buildStageSelect();
});

function startGame(){
  currentStage=STAGES[selStage];
  currentPlatforms=currentStage.platforms;
  document.getElementById('title-screen').style.display='none';
  document.getElementById('game-wrap').style.display='flex';
  document.getElementById('p1-name-label').textContent=CHARS[sel1].name;
  document.getElementById('p2-name-label').textContent=CHARS[sel2].name;
  document.getElementById('p1-stocks').className='stock-bar p1';
  document.getElementById('p2-stocks').className='stock-bar p2';
  p1=new Player(1,CHARS[sel1],180,300,KEY_P1);
  p2=new Player(2,CHARS[sel2],580,300,KEY_P2);
  gameTime=99;document.getElementById('timer').textContent=gameTime;
  keysDown={};particles.length=0;hitflashes.length=0;gameRunning=true;
  clearInterval(timeInterval);
  timeInterval=setInterval(()=>{if(!gameRunning)return;gameTime--;document.getElementById('timer').textContent=gameTime;},1000);
  cancelAnimationFrame(frameId);
  gameLoop();
}
</script>
</body>
